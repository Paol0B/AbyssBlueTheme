<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <!-- Dark badge in the Abyss Blue canvas/island colors -->
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11151C"/>
      <stop offset="100%" stop-color="#0D1015"/>
    </linearGradient>
    <!-- Blue accent for the mark -->
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92B7FF"/>
      <stop offset="55%" stop-color="#538AF9"/>
      <stop offset="100%" stop-color="#3871E1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="26%" r="75%">
      <stop offset="0%" stop-color="#3871E1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3871E1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rounded-square badge -->
  <rect x="1" y="1" width="38" height="38" rx="9" fill="url(#badge)" stroke="#22303F" stroke-width="1"/>
  <rect x="1" y="1" width="38" height="38" rx="9" fill="url(#glow)"/>
  <!-- Abyss: descending / nested chevrons fading into depth -->
  <g fill="none" stroke="url(#mark)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10.5 12 L20 19.5 L29.5 12" stroke-width="3"/>
    <path d="M12.5 19.5 L20 25.5 L27.5 19.5" stroke-width="2.6" opacity="0.78"/>
    <path d="M14.5 26.5 L20 31 L25.5 26.5" stroke-width="2.2" opacity="0.5"/>
  </g>
</svg>
